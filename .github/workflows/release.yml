name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ocaml/opam:alpine-3.21-ocaml-5.1
      options: --user root
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install file utility
        run: apk add --no-cache file

      - name: Install dependencies
        run: |
          chown -R opam:opam .
          su -s /bin/sh opam -c "opam install . --deps-only --with-test -y"

      - name: Test
        run: su -s /bin/sh opam -c "opam exec -- dune test"

      - name: Build (static profile)
        run: su -s /bin/sh opam -c "opam exec -- dune build --profile static @install"

      - name: Copy binary
        run: cp _build/install/default/bin/ocaml-compose-dsl ocaml-compose-dsl-linux-x86_64

      - name: Verify static linking
        run: |
          file_out=$(file ocaml-compose-dsl-linux-x86_64)
          echo "$file_out"
          echo "$file_out" | grep -qE "statically linked|static-pie linked" || { echo "ERROR: binary is not statically linked"; exit 1; }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ocaml-compose-dsl-linux-x86_64
          path: ocaml-compose-dsl-linux-x86_64
          if-no-files-found: error

  build-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ocaml/setup-ocaml@fefd9c240b9d934d5d25aa9c2a8caae6c7b40079 # v3
        with:
          ocaml-compiler: "5.1"

      - run: opam install . --deps-only --with-test -y

      - run: opam exec -- dune test

      - run: opam exec -- dune build --profile release @install

      - name: Copy binary
        run: cp _build/install/default/bin/ocaml-compose-dsl ocaml-compose-dsl-macos-arm64

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ocaml-compose-dsl-macos-arm64
          path: ocaml-compose-dsl-macos-arm64
          if-no-files-found: error

  release:
    needs: [build-linux, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/*

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
          generate_release_notes: true
